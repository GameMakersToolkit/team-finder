ktor {
    application {
        modules = [ com.gmtkvotingsystem.AuthModuleKt.authModule, com.gmtkvotingsystem.ApplicationKt.module ]
    }
    deployment {
        port = 8080
    }
    development = true
}

jwt {
    secret = "secret"
    issuer = "http://0.0.0.0:8080/"
    audience = "http://0.0.0.0:8080/hello"
}

secrets {
    discord {
        client {
            id = ${DISCORD_CLIENT_ID}
            secret = ${DISCORD_CLIENT_SECRET}
        }
    }

    database {
        url = ${DATABASE_URL}
    }
}

api {
    host = ${API_URL}
}

ui {
    host = ${UI_URL}
}

bot {
    token = default_token_to_let_app_start
    token = ${?DISCORD_BOT_TOKEN}

    guildId = ${DISCORD_GUILD_ID}
    adminIds = ${ADMIN_DISCORD_IDS}
}
