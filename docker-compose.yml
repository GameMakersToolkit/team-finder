version: '3.6'

services:
  api:
    container_name: team-finder-api
    build: ./api
    restart: on-failure
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - ./.env

  ui:
    container_name: team-finder-ui
    build:
      context: ./ui
      dockerfile: Dockerfile.dev
    restart: on-failure
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    volumes:
      - ./ui:/app

  opensearch:
    image: opensearchproject/opensearch
    restart: always
    environment:
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=_HeL/@u0BF/i^y29kA!8?" # Opensearch won't start without a strong password
      - "discovery.type=single-node"
    ports:
      - "9200:9200"
      - "9600:9600"

  # Credentials are username: admin and password: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD} (see above)
  opensearch-dashboard:
    image: opensearchproject/opensearch-dashboards
    depends_on:
      - opensearch
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
    ports:
      - "5601:5601"

  db:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"

  db-seed:
    build: ./db/seed
    links:
      - db

  db-viewer:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@db:27017/
